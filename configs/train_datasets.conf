# ===== Helper: assemble DATASET_NAME / IMAGE_FOLDER / DEPTH_ROOT from TRAIN_DATASETS =====
# After sourcing this file in the training script, call build_train_args
build_train_args() {
    DATASET_NAME=""
    IMAGE_FOLDER=""
    DEPTH_ROOT=""
    for ds in ${TRAIN_DATASETS}; do
        jsonl_var="${ds}_JSONL"
        image_var="${ds}_IMAGE"
        depth_var="${ds}_DEPTH"
        jsonl="${!jsonl_var}"
        image="${!image_var}"
        depth="${!depth_var}"
        if [ -z "${jsonl}" ]; then
            echo "WARNING: ${jsonl_var} not defined, skipping ${ds}"
            continue
        fi
        if [ -n "${DATASET_NAME}" ]; then
            DATASET_NAME="${DATASET_NAME};${jsonl}"
            IMAGE_FOLDER="${IMAGE_FOLDER};${image}"
            DEPTH_ROOT="${DEPTH_ROOT};${depth}"
        else
            DATASET_NAME="${jsonl}"
            IMAGE_FOLDER="${image}"
            DEPTH_ROOT="${depth}"
        fi
        echo "  + ${ds}: $(basename ${jsonl})"
    done
    export DATASET_NAME IMAGE_FOLDER DEPTH_ROOT
}
